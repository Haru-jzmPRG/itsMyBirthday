<!-- index.html -->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🎂</title>
    <link rel="stylesheet" href="css/main.css" />
</head>

<body>

    <div id="screen-register" class="screen active">
        <div class="home-wrapper">
            <header class="home-header">
                <h1>🎂</h1>
                <p class="home-subtitle">¿Cómo te llamas?</p>
            </header>
            <div class="register-card">
                <input id="input-name" type="text" placeholder="Tu nombre" maxlength="20" autocomplete="off" />
                <button id="btn-join" class="btn-primary">Unirse a la fiesta 🎉</button>
                <p id="join-error" class="error-msg hidden">Ese nombre ya está en uso, elige otro.</p>
            </div>
        </div>
    </div>
    <div id="screen-menu" class="screen">
        <div class="home-wrapper">

            <header class="home-header">
                <h1>🎂</h1>
                <p id="welcome-msg" class="home-subtitle"></p>
            </header>

            <main class="home-grid">

                <!-- FILA 1: Música -->
                <a href="music/player.html" class="module-card music">
                    <span class="module-icon">🎵</span>
                    <span class="module-title">Adivina la canción</span>
                    <span class="module-desc">Cae en la nota</span>
                </a>

                <a href="music/host.html" class="module-card host">
                    <span class="module-icon">🎛️</span>
                    <span class="module-title">Host música</span>
                    <span class="module-desc">Juez</span>
                </a>

                <!-- FILA 2: Juegos de mesa -->
                <!--
                  JUEGOS DE MESA — duplicá este bloque por cada juego nuevo
                  Cambiá: href, module-icon, module-title, module-desc
                  Colores disponibles: boardgame-1 / boardgame-2 / boardgame-3 / boardgame-4
                -->
                <a href="boardgames/scores.html" class="module-card boardgame-1">
                    <span class="module-icon">🎲</span>
                    <span class="module-title">Juegos de mesa</span>
                    <span class="module-desc">Ver puntajes</span>
                </a>

                <a href="boardgames/host.html" class="module-card host">
                    <span class="module-icon">🎯</span>
                    <span class="module-title">Host juegos</span>
                    <span class="module-desc">Juez</span>
                </a>

                <!-- FILA 3: Fotos — centrada -->
                <a href="photos/index.html" class="module-card photos centered">
                    <span class="module-icon">📸</span>
                    <span class="module-title">Galería</span>
                    <span class="module-desc">Saca fotos y compartilas</span>
                </a>

            </main>

            <!-- Botón reinicio global — discreto al fondo -->
            <div class="reset-app-wrapper">
                <button id="btn-reset-app" class="btn-reset-app">🗑 Reiniciar app completa</button>
            </div>

        </div>
    </div>

    <script type="module">
        import { joinGame, playerExists } from "./js/scores.js";
        import { HOST_PASSWORD } from "./config.js";

        const GAME_ID = "lobby";

        // ── Helpers ────────────────────────────────────────────
        function showScreen(id) {
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            document.getElementById(id).classList.add("active");
        }

        function show(id) { document.getElementById(id).classList.remove("hidden"); }
        function hide(id) { document.getElementById(id).classList.add("hidden"); }

        // ── Si ya se registró antes, verificar que sigue en Firebase ──
        const savedName = localStorage.getItem("playerName");
        if (savedName) {
            const exists = await playerExists(GAME_ID, savedName);
            if (exists) {
                document.getElementById("welcome-msg").textContent = `¡Hola, ${savedName}! 👋`;
                showScreen("screen-menu");
            } else {
                localStorage.removeItem("playerName");
                showScreen("screen-register");
            }
        }

        // ── Registro ───────────────────────────────────────────
        document.getElementById("btn-join").addEventListener("click", async () => {
            const input = document.getElementById("input-name");
            const name = input.value.trim();
            if (!name) return;

            document.getElementById("btn-join").textContent = "Entrando...";
            document.getElementById("btn-join").disabled = true;

            const joined = await joinGame(GAME_ID, name);

            if (!joined) {
                show("join-error");
                document.getElementById("btn-join").textContent = "Unirse a la fiesta 🎉";
                document.getElementById("btn-join").disabled = false;
                return;
            }

            localStorage.setItem("playerName", name);
            document.getElementById("welcome-msg").textContent = `¡Hola, ${name}! 👋`;
            showScreen("screen-menu");
        });

        document.getElementById("input-name").addEventListener("keydown", (e) => {
            if (e.key === "Enter") document.getElementById("btn-join").click();
        });

        // ── Reiniciar app completa ─────────────────────────────
        document.getElementById("btn-reset-app").addEventListener("click", async () => {
            const pass = prompt("🔒 Contraseña del host:");
            if (pass === null) return;
            if (pass !== HOST_PASSWORD) { alert("❌ Contraseña incorrecta."); return; }
            if (!confirm("¿Reiniciar TODO? Se borran jugadores, puntajes y fotos.")) return;

            const { db, ref } = await import("./js/firebase.js");
            const { set } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");

            // Borrar jugadores, puntajes, estado del juego, juegos de mesa y fotos
            await set(ref(db, "games"),      null);
            await set(ref(db, "boardgames"), null);
            await set(ref(db, "photos"),     null);

            alert("✓ App reiniciada. Todos deberán volver a registrarse.");
        });
    </script>

</body>

</html>
