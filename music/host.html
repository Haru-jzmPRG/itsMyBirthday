<!-- music/host.html -->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🎛️ Host — itsMyBirthday</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/music.css" />
</head>

<body>

    <!-- Contenedor invisible del player de YouTube -->
    <div id="yt-player" style="position:absolute;pointer-events:none;opacity:0;"></div>

    <!-- ── CARGANDO ───────────────────────────────────────── -->
    <div id="screen-loading" class="screen active">
        <div class="center-card">
            <div class="spinner"></div>
            <p>Iniciando reproductor...</p>
        </div>
    </div>

    <!-- ── JUEGO ──────────────────────────────────────────── -->
    <div id="screen-game" class="screen">

        <div class="host-topbar">
            <a href="../index.html" class="btn-back">← Volver</a>
            <button id="btn-reset-all" class="btn-danger-small">🗑 Reiniciar app</button>
        </div>

        <!-- Canción actual (se revela al tocar el botón) -->
        <div id="track-card" class="track-card hidden">
            <div class="track-thumb">🎵</div>
            <div class="track-info">
                <span id="track-title">—</span>
                <span id="track-artist">—</span>
            </div>
        </div>

        <!-- Controles principales -->
        <div class="host-controls">

            <!-- Botón play / pausar -->
            <button id="btn-play" class="btn-primary btn-big">
                ▶ Sonar 1 segundo
            </button>

            <!-- Panel de extensión (aparece tras el primer play) -->
            <div id="extend-panel" class="extend-panel hidden">
                <p>¿Cuánto más la dejás sonar?</p>
                <div class="extend-buttons">
                    <button class="btn-extend" data-seconds="2">+2s</button>
                    <button class="btn-extend" data-seconds="5">+5s</button>
                    <button class="btn-extend" data-seconds="10">+10s</button>
                    <button class="btn-extend" data-seconds="30">+30s</button>
                </div>
                <!-- Botón pausa/reanudar -->
                <button id="btn-pause" class="btn-secondary" style="margin-top:8px;">
                    ⏸ Pausar
                </button>
            </div>

            <button id="btn-reveal" class="btn-secondary hidden">
                👁 Revelar canción
            </button>

            <button id="btn-next" class="btn-secondary hidden">
                ⏭ Siguiente canción
            </button>

        </div>

        <!-- Panel de jugadores -->
        <div class="players-section">
            <div class="section-header">
                <h3>Jugadores</h3>
                <button id="btn-reset" class="btn-danger-small">Reset puntos</button>
            </div>
            <div id="player-list">
                <p class="empty-msg">Esperando jugadores...</p>
            </div>
        </div>

    </div>

    <script type="module">
        import {
            getRandomTrack,
            initYouTubePlayer,
            playTrack,
            extendPlayback,
            pauseTrack,
            resumeTrack,
            stopTrack,
            isPlaying,
            broadcastTrack,
            revealTrack,
            setWaiting,
            initHostPanel,
            resetRound,
        } from "./music.js";
        import { HOST_PASSWORD } from "../config.js";

        // ── Estado ─────────────────────────────────────────────
        let currentTrack = null;
        let playedIds = [];
        let hasPlayed = false;
        let paused = false;

        // ── Helpers ────────────────────────────────────────────
        function showScreen(id) {
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            document.getElementById(id).classList.add("active");
        }

        function show(id) { document.getElementById(id).classList.remove("hidden"); }
        function hide(id) { document.getElementById(id).classList.add("hidden"); }

        // ── Init YouTube ───────────────────────────────────────
        initYouTubePlayer("yt-player", async () => {
            initHostPanel("player-list");
            await setWaiting();
            loadNextTrack();
            showScreen("screen-game");
        });

        // ── Cargar siguiente canción ───────────────────────────
        function loadNextTrack() {
            currentTrack = getRandomTrack(playedIds);

            if (!currentTrack) {
                alert("¡Se acabaron las canciones! Reseteando...");
                playedIds = [];
                currentTrack = getRandomTrack([]);
            }

            playedIds.push(currentTrack.id);
            hasPlayed = false;
            paused = false;

            // Resetear UI
            hide("track-card");
            hide("extend-panel");
            hide("btn-reveal");
            hide("btn-next");
            show("btn-play");

            document.getElementById("track-title").textContent = currentTrack.title;
            document.getElementById("track-artist").textContent = currentTrack.artist;
            document.getElementById("btn-play").textContent = "▶ Sonar 1 segundo";
            document.getElementById("btn-play").disabled = false;
            document.getElementById("btn-pause").textContent = "⏸ Pausar";
        }

        // ── Botón: sonar 1 segundo ─────────────────────────────
        document.getElementById("btn-play").addEventListener("click", async () => {
            if (!currentTrack) return;

            await broadcastTrack(currentTrack);

            playTrack(currentTrack.id, 1, () => {
                paused = false;
                document.getElementById("btn-pause").textContent = "⏸ Pausar";
            });

            document.getElementById("btn-play").textContent = "🎵 Sonando...";
            document.getElementById("btn-play").disabled = true;
            hasPlayed = true;

            show("extend-panel");
            show("btn-reveal");
        });

        // ── Botones: extender tiempo ───────────────────────────
        document.querySelectorAll(".btn-extend").forEach(btn => {
            btn.addEventListener("click", () => {
                const seconds = parseInt(btn.dataset.seconds);
                paused = false;
                document.getElementById("btn-pause").textContent = "⏸ Pausar";

                extendPlayback(seconds, () => {
                    paused = false;
                    document.getElementById("btn-pause").textContent = "⏸ Pausar";
                });

                btn.textContent = `✓ +${seconds}s`;
                setTimeout(() => { btn.textContent = `+${seconds}s`; }, 1500);
            });
        });

        // ── Botón: pausar / reanudar ───────────────────────────
        document.getElementById("btn-pause").addEventListener("click", () => {
            if (!hasPlayed) return;

            if (isPlaying()) {
                pauseTrack();
                paused = true;
                document.getElementById("btn-pause").textContent = "▶ Reanudar";
            } else {
                paused = false;
                document.getElementById("btn-pause").textContent = "⏸ Pausar";
                resumeTrack(30, () => {
                    document.getElementById("btn-pause").textContent = "⏸ Pausar";
                });
            }
        });

        // ── Botón: revelar canción ─────────────────────────────
        document.getElementById("btn-reveal").addEventListener("click", async () => {
            stopTrack();
            await revealTrack(currentTrack);
            show("track-card");
            show("btn-next");
            hide("extend-panel");
            hide("btn-reveal");
            hide("btn-play");
        });

        // ── Botón: siguiente canción ───────────────────────────
        document.getElementById("btn-next").addEventListener("click", async () => {
            await setWaiting();
            loadNextTrack();
        });

        // ── Botón: reset puntos ────────────────────────────────
        document.getElementById("btn-reset").addEventListener("click", async () => {
            if (confirm("¿Resetear todos los puntos a 0?")) {
                await resetRound();
            }
        });

        // ── Botón: reiniciar app completa ──────────────────────
        document.getElementById("btn-reset-all").addEventListener("click", async () => {
            const pass = prompt("🔒 Ingresá la contraseña del host para reiniciar:");
            if (pass === null) return; // canceló
            if (pass !== HOST_PASSWORD) {
                alert("❌ Contraseña incorrecta.");
                return;
            }
            if (confirm("¿Reiniciar toda la app? Esto borra todos los jugadores y puntajes.")) {
                const { db, ref } = await import("../js/firebase.js");
                const { set } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
                await set(ref(db, "games"), null);
                await setWaiting();
                loadNextTrack();
                alert("✓ App reiniciada.");
            }
        });
    </script>

</body>

</html>
