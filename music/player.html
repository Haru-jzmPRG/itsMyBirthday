<script type="module">
    import { watchGameState } from "./music.js";
    import { joinGame, watchScoreboard } from "../js/scores.js";

    const GAME_ID = "music";
    let playerName = null;

    function showScreen(id) {
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
    }

    function show(id) { document.getElementById(id).classList.remove("hidden"); }
    function hide(id) { document.getElementById(id).classList.add("hidden"); }

    // ── Si ya tiene nombre guardado, entrar directo ─────────
    const savedName = localStorage.getItem("playerName");
    if (savedName) {
        enterGame(savedName);
    }

    async function enterGame(name) {
        playerName = name;
        await joinGame(GAME_ID, name);

        watchScoreboard(GAME_ID, "scoreboard-waiting");
        watchScoreboard(GAME_ID, "scoreboard-playing");
        watchScoreboard(GAME_ID, "scoreboard-revealed");
        watchGameState(handleGameState);

        document.getElementById("waiting-name").textContent = `Jugando como ${playerName}`;
        showScreen("screen-waiting");
    }

    // ── Registro manual si no hay nombre guardado ──────────
    document.getElementById("btn-join").addEventListener("click", async () => {
        const input = document.getElementById("input-name");
        const name = input.value.trim();
        if (!name) return;

        const joined = await joinGame(GAME_ID, name);
        if (!joined) {
            show("join-error");
            return;
        }

        localStorage.setItem("playerName", name);
        hide("join-error");
        await enterGame(name);
    });

    document.getElementById("input-name").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("btn-join").click();
    });

    // ── Manejar estados ────────────────────────────────────
    function handleGameState(state) {
        if (!state) return;
        switch (state.status) {
            case "waiting": showScreen("screen-waiting"); break;
            case "playing": showScreen("screen-playing"); break;
            case "revealed":
                document.getElementById("reveal-cover").src = state.cover || "";
                document.getElementById("reveal-name").textContent = state.trackName || "—";
                document.getElementById("reveal-artist").textContent = state.artist || "—";
                showScreen("screen-revealed");
                break;
        }
    }
</script>
